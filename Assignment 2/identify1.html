<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identify Your Plant</title>
    <style>
        /* General styling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Header styling */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #e0e0e0;
            padding: 15px 20px;
            box-sizing: border-box;
        }

        .header img.left-icon {
            width: 50px;
            height: auto;
        }

        .header h1 {
            flex-grow: 1;
            font-size: 24px;
            color: #333;
            margin: 0;
            text-align: center;
        }

        .header img.right-icon {
            width: 50px;
            height: auto;
        }

        /* Content styling */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .content h2 {
            font-size: 20px;
            margin-bottom: 10px;
            margin-top: 10px;
            padding: 40px; 
        }

        .content .leaf-icon {
            font-size: 24px;
            vertical-align: middle;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .upload-section form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* Add spacing between elements */
        }

        .upload-section button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .upload-section button:hover {
            background-color: #218838;
        }

        .upload-section p {
            font-size: 16px;
            margin-top: 10px;
            color: #555;
        }

        .form-container input[type="file"] {
            margin: 10px 0;
        }

        .form-container input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .form-container input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="h.png" alt="Left Icon" class="left-icon">
            </a>
            <h1>Identify Your Plant</h1>
            <a href="gallery.html">
                <img src="15.png" alt="Gallery Icon" class="right-icon">
            </a>
        </div>
        <div class="content">
            <h1>Identify Plants Instantly🌱</h1>
            <div class="form-container upload-section">
                <p>Upload a photo and get detailed information about the plant species.</p>
                <form action="#" method="post" enctype="multipart/form-data">
                    <input type="file" name="plantImage" accept="image/*">
                    <input type="submit" value="Identify Plant">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
