<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Plant Identification App</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        .header {
            background-color: #e0e0e0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5em;
        }
        .header img {
            width: 80px;
            height: auto;
            margin-right: 10px;
        }
        .content {
            margin-top: 50px;
            text-align: center;
        }
        .content img {
            max-width: 100%;
            height: auto;
        }
        .text-container {
            position: relative;
            display: inline-block;
        }
        .text-container img {
            display: block;
        }
        .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            color: #333;
            font-weight: bold;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="h.png" alt="Plant Icon" class="header-img">
        <h1>Welcome to Digital Plant Identification App</h1>
    </header>

    <section class="content">
        <div class="image">
            <a href="main.html">
                <img src="m.jfif" alt="Clickable Image" class="content-img">
                CLICK ME
            </a>
        </div>
    </section>
</body>
</html>
