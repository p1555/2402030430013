<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Care Tips</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .header {
            width: 100%;
            background-color: #d3d3d3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .header img {
            height: 50px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .content {
            background-color: #d3e8d3;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 500px;
            margin: 0;
        }

        .content .item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .content .item:last-child {
            margin-bottom: 0;
        }

        .content .item .icon {
            background-color: #8bc34a;
            color: white;
            border-radius: 50%;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .content .item p {
            margin-left: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">
            <img src="h.png" alt="Plant Icon">
        </a>
        <h1>Plant Care Tips🌱</h1>
        <a href="resources.html">
            <img src="image 25.png" alt="Resources Icon">
        </a>
    </div>
    <div class="content">
        <div class="item">
            <div class="icon">✔</div>
            <p>Moisten the leaves.</p>
        </div>
        <div class="item">
            <div class="icon">✔</div>
            <p>Moisten your soil.</p>
        </div>
        <div class="item">
            <div class="icon">✔</div>
            <p>Let it get sunlight.</p>
        </div>
        <div class="item">
            <div class="icon">✔</div>
            <p>Talk to them :)</p>
        </div>
    </div>
</body>
</html>
