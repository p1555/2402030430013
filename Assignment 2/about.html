<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Plant Identification</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #d3d3d3;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .header img {
            height: 50px;
            width: auto;
        }

        .header .contact-us {
            background-color: #f0f0f0;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .content {
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            max-width: 800px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">
            <img src="h.png" alt="Home Icon">
        </a>
        <h1>About Us</h1>
        <a href="contact.html">
            <img src="image 23.png" alt="Contact Icon">
        </a>
    </div>
    <div class="content">
        <p>Welcome to Digital Plant Identification, your companion in discovering, identifying, and caring for plants! Our mission is to connect people with nature by making plant identification simple and providing easy-to-follow care guides.</p>
    </div>
</body>
</html>
