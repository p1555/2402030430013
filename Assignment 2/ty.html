<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: #f0f0f0;
            text-align: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .header img {
            height: 50px;
            width: auto;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .thank-you-content {
            padding: 20px;
            box-sizing: border-box;
            max-width: 800px;
            width: 90%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .thank-you-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .thank-you-content p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e74c3c;
        }

        .thank-you-content button {
            background-color: #e0e0e0;
            color: #34495e;
            border: none;
            padding: 10px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            margin-top: 10px;
            text-decoration: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .thank-you-content button:hover {
            background-color: #d0d0d0;
            box-shadow: 0 3px 7px rgba(0,0,0,0.3);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
        }

        .page-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="header">
            <a href="index.html">
                <img src="h.png" alt="Home Icon">
            </a>
        </header>
        <main class="page-content">
            <div class="thank-you-content">
                <h2>Thank You for Reaching Out!</h2>
                <p>Your message has been received. We'll get back to you soon!</p>
                <a href="index.html" class="home-page-button">Return to home page</a>
            </div>
        </main>
    </div>
</body>
</html>
